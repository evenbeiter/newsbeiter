<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Webtoon Reader Fixed</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden; /* ❗ lock body scroll, use viewport instead */
}

/* ================= UI ================= */
.ui-bar {
  position: fixed;
  top: 10px;
  left: 10px;
  right: 10px;
  z-index: 2000;
  display: flex;
  justify-content: space-between;
}

.glass {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  border-radius: 12px;
  padding: 6px 10px;
  color: white;
}

/* ================= episode menu ================= */
#episodeMenu {
  position: fixed;
  top: 60px;
  left: 10px;
  z-index: 2001;
  width: 220px;
  max-height: 70vh;
  overflow-y: auto;
  display: none;
}

/* ================= VIEWPORT (IMPORTANT FIX) ================= */
#viewport {
  height: 100vh;
  width: 100vw;
  overflow-y: auto;   /* ✅ THIS FIXES YOUR ISSUE */
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-y;
}

/* ================= PANELS ================= */
#wrapper {
  display: flex;
  width: 200vw;
  height: auto;
}

.panel {
  width: 100vw;
  min-height: 100vh;
  overflow: visible;
}

canvas {
  width: 100%;
  display: block;
}
</style>
</head>

<body>

<!-- UI -->
<div class="ui-bar">
  <div class="glass">
    Episode: <span id="epLabel">1</span>
    <button class="btn btn-sm btn-light ms-2" onclick="toggleMenu()">☰</button>
  </div>

  <div class="glass fw-bold" id="langLabel">EN</div>

  <div class="btn-group">
    <button class="btn btn-sm btn-outline-light" onclick="setLang(0)">EN</button>
    <button class="btn btn-sm btn-outline-light" onclick="setLang(1)">ZH</button>
  </div>
</div>

<!-- episode menu -->
<div id="episodeMenu" class="glass"></div>

<!-- VIEWPORT -->
<div id="viewport">
  <div id="wrapper">
    <div class="panel">
      <canvas id="canvas-en"></canvas>
    </div>
    <div class="panel">
      <canvas id="canvas-zh"></canvas>
    </div>
  </div>
</div>

<script>
/* ================= STATE ================= */
const preStr = 'https://newsbeiter.onrender.com/api/fetch?url=';
let currentEp = null;

const epLabel = document.getElementById("epLabel");
const viewport = document.getElementById("viewport");
const langLabel = document.getElementById("langLabel");

/* ================= MENU ================= */
function toggleMenu() {
  const el = document.getElementById("episodeMenu");
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function buildEpisodeMenu() {
  const el = document.getElementById("episodeMenu");
  for (let i = 1; i <= 50; i++) {
    const btn = document.createElement("button");
    btn.className = "btn btn-sm btn-outline-light w-100 my-1";
    btn.innerText = "EP " + i;
    btn.onclick = () => loadEpisode(i);
    el.appendChild(btn);
  }
}

/* ================= LOAD EPISODE ================= */
async function loadEpisode(epi) {
  currentEp = epi;
  epLabel.innerText = epi;

  const data = await fetchEpisode(epi);

  await Promise.all([
    stitch("canvas-en", data.en),
    stitch("canvas-zh", data.zh),
  ]);

  document.getElementById("episodeMenu").style.display = "none";

  requestAnimationFrame(() => {
    viewport.scrollTop = 0;
  });
}

/* ================= FETCH ================= */
async function fetchEpisode(epi) {
  const en = Array.from({length: 20}, (_, i) =>
    `https://picsum.photos/800/1200?random=${epi * 100 + i}`
  );

  const zh = Array.from({length: 20}, (_, i) =>
    `https://picsum.photos/800/1200?random=${epi * 200 + i}`
  );

  return { en, zh };
}

/* ================= IMAGE ================= */
function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

/* ================= STITCH + SCROLL RENDER ================= */
let layoutMap = new Map();

async function stitch(canvasId, urls) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext("2d");

  const imgs = (await Promise.allSettled(urls.map(loadImage)))
    .filter(r => r.status === "fulfilled")
    .map(r => r.value);

  if (!imgs.length) return;

  const width = Math.max(...imgs.map(i => i.width));

  let layout = [];
  let y = 0;

  for (const img of imgs) {
    layout.push({ img, y, h: img.height });
    y += img.height;
  }

  canvas.width = width;
  canvas.height = y;

  layoutMap.set(canvasId, layout);

  function render() {
    const scrollY = viewport.scrollTop;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (const item of layout) {
      const top = item.y;
      const bottom = item.y + item.h;

      if (bottom < scrollY || top > scrollY + window.innerHeight) continue;

      const drawY = item.y - scrollY;
      ctx.drawImage(item.img, 0, drawY);
    }
  }

  viewport.addEventListener("scroll", render, { passive: true });
  render();
}

/* ================= LANG SWITCH ================= */
let index = 0;
function setLang(i) {
  index = i;
  document.getElementById("wrapper").style.transform =
    `translateX(-${i * 100}vw)`;

  langLabel.innerText = ["EN", "ZH"][i];
}

/* ================= INIT ================= */
buildEpisodeMenu();
loadEpisode(1);
</script>

</body>
</html>
