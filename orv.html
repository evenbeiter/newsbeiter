/* ===== 3. 新增 Lazy Load Renderer ===== */

function renderImages(containerId, urls) {

  const container = document.getElementById(containerId);

  container.innerHTML = "";

  urls.forEach(url => {

    const img = document.createElement("img");

    img.loading = "lazy";

    img.dataset.src = url;

    img.alt = "";

    container.appendChild(img);

    imageObserver.observe(img);
  });
}


const imageObserver = new IntersectionObserver(entries => {

  entries.forEach(entry => {

    if (!entry.isIntersecting) return;

    const img = entry.target;

    if (!img.src) {
      img.src = img.dataset.src;
    }

    imageObserver.unobserve(img);

  });

},{
  root:null,
  rootMargin:"1200px"
});


/* ================= STATE ================= */

const preStr = 'https://newsbeiter.onrender.com/api/fetch?url=';
const TOTAL_EP = 500;
let currentEp = null;
let index = 0;

const cache = new Map(); // episode cache

const wrapper = document.getElementById("wrapper");
const label = document.getElementById("langLabel");
const epLabel = document.getElementById("epLabel");

/* ================= EP MENU ================= */

function buildEpisodeMenu() {
  const el = document.getElementById("episodeMenu");

  const step = 50;

  for (let s = 1; s <= TOTAL_EP; s += step) {
    const e = Math.min(s + step - 1, TOTAL_EP);

    const block = document.createElement("div");
    block.innerHTML = `<b>${s}-${e}</b><br/>`;

    for (let i = s; i <= e; i++) {
      const btn = document.createElement("button");
      btn.className = "btn btn-sm btn-outline-light w-100 my-1";
      btn.innerText = "EP " + i;

      btn.onclick = () => loadEpisode(i);

      block.appendChild(btn);
    }

    el.appendChild(block);
  }
}

function toggleMenu() {
  const el = document.getElementById("episodeMenu");
  el.style.display = el.style.display === "none" ? "block" : "none";
}

/* ================= LAZY LOAD ================= */

async function loadEpisode(epi) {
  currentEp = epi;
  epLabel.innerText = epi;

  // ✅ 記住最後 EP
  localStorage.setItem("lastEp", epi);

  if (!cache.has(epi)) {
    cache.set(epi, fetchEpisode(epi));
  }

  const imageLists = await fetchEpisode(epi);
  cache.set(epi, imageLists);

  // const imageLists = await cache.get(epi);

  renderImages("panel-en", imageLists.en);

  renderImages("panel-zh", imageLists.zh);

  // await Promise.all([
  //   stitch("canvas-en", imageLists.en),
  //   stitch("canvas-zh", imageLists.zh),
  //   // stitch("canvas-kr", imageLists.kr),
  // ]);

  // ✅ restore EN scroll（延遲確保 canvas 已 render）
  requestAnimationFrame(() => {
    requestAnimationFrame(restoreENScroll);
  });

  console.log("cache hit epi:", epi, cache.get(epi));
  document.getElementById("episodeMenu").style.display = "none";
  // document.getElementById("emptyState")?.style &&
  // (document.getElementById("emptyState").style.display = "none");
}

/* ================= SCROLL EN ================= */

// const enPanel = document.querySelectorAll(".panel")[0]; // EN

const enPanel = document.getElementById("panel-en");
const zhPanel = document.getElementById("panel-zh");

let syncing = false;

enPanel.addEventListener("scroll", () => {

  if (syncing) return;

  syncing = true;

  const ratio =
    enPanel.scrollTop /
    (enPanel.scrollHeight - enPanel.clientHeight);

  zhPanel.scrollTop =
    ratio *
    (zhPanel.scrollHeight - zhPanel.clientHeight);

  syncing = false;

},{passive:true});

function restoreENScroll() {
  const enPanel = document.querySelectorAll(".panel")[0];

  const saved = localStorage.getItem(`scroll_en_${currentEp}`);

  if (saved !== null) {
    enPanel.scrollTop = Number(saved);
  }
}

/* ================= FETCH ================= */

async function fetchEpisode(epi) {
  const [enImages, zhImages] = await Promise.all([
    getWebtoonEpisodeImages(2154, epi),
    getWebtoonEpisodeImages(2089, epi)
  ]);

  const proxy = "https://newsbeiter.onrender.com/img?url=";

  const wrap = (arr) =>
    arr.map(url => proxy + encodeURIComponent(url));

  return {
    en: wrap(enImages),
    zh: wrap(zhImages)
    // kr: [] // optional
  };
}

/* ================= API ================= */

async function getEpisodeThumbnailM(titleNo){
  const res = await fetch(`${preStr}https://m.webtoons.com/api/v1/webtoon/${titleNo}/episodes?pageSize=1000`);
  const str = await res.json();

  return Object.fromEntries(
    str.result.episodeList.map(item => [
      item.episodeNo,
      item.viewerLink
    ])
  );
}

let toc;
(async () => {
  const en = await getEpisodeThumbnailM(2154);
  const zh = await getEpisodeThumbnailM(2089);

  toc = {
    2154: en,
    2089: zh
  };

  console.log(toc);
})();

async function getWebtoonEpisodeImages(titleNo, episodeNo) {
  const viewerUrl = `https://www.webtoons.com${toc[titleNo][episodeNo]}`;
  const images = await fetchQ90Images(preStr+encodeURIComponent(viewerUrl));
  return images;
}

async function getEpisodeThumbnail(titleNo, episodeNo) {
  const url = preStr+"https://m.webtoons.com/api/v1/recent/episode-thumbnail";

  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      episodeIds: [{ webtoonType: "WEBTOON", titleNo, episodeNo }]
    })
  });

  const data = await res.json();
  return data?.[0]?.viewerUrl;
}

async function fetchQ90Images(viewerUrl) {
  const res = await fetch(viewerUrl);
  const html = await res.text();

  const matches = [...html.matchAll(/https?:\/\/[^"']+type=q90[^"']*/g)];
  return [...new Set(matches.map(m => m[0]))];
}

/* ================= IMAGE + CANVAS REUSE ================= */

function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => res(img);
    img.onerror = rej;
    img.onerror = (e) => {
      console.log("IMG FAIL:", src);
      rej(e);
    };
    img.src = src;
  });
}

const canvasCache = new Map();

const TILE_HEIGHT = 4000;

async function stitch(canvasId, urls) {
  const container = document.getElementById(canvasId + "-container");
  container.innerHTML = "";

  const imgs = (await Promise.allSettled(urls.map(loadImage)))
    .filter(r => r.status === "fulfilled")
    .map(r => r.value);

  const width = Math.max(...imgs.map(i => i.width));

  let tileIndex = 0;
  let tileCanvas = createTile(tileIndex);
  let ctx = tileCanvas.getContext("2d");

  let tileY = 0;     // 每個 tile 內的 y
  let globalY = 0;   // 全局累積 y（關鍵）

  function createTile(i) {
    const c = document.createElement("canvas");
    c.width = width;
    c.height = TILE_HEIGHT;
    c.style.width = "100%";
    c.style.display = "block";
    container.appendChild(c);
    return c;
  }

  for (const img of imgs) {
    // 如果這張圖會跨 tile → 分割 tile
    if (tileY + img.height > TILE_HEIGHT) {
      tileIndex++;
      tileCanvas = createTile(tileIndex);
      ctx = tileCanvas.getContext("2d");
      tileY = 0;
    }

    ctx.drawImage(img, 0, tileY);

    tileY += img.height;
    globalY += img.height;
  }
}

/* ================= INTERSECTION OBSERVER ================= */

const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      console.log("panel visible:", e.target.id);
    }
  });
}, {
  threshold: 0.3
});

document.querySelectorAll(".panel").forEach(p => observer.observe(p));

/* ================= SWIPE ================= */

function updateUI() {
  wrapper.style.transform = `translateX(-${index * 100}vw)`;
  label.innerText = ["EN","ZH"][index];
}

function setLang(i) {
  index = i;
  updateUI();
}

const viewport = document.getElementById("viewport");

let startX = 0;
let startY = 0;

viewport.addEventListener("touchstart", (e) => {
  const t = e.touches[0];

  startX = t.clientX;
  startY = t.clientY;
}, { passive: true });

viewport.addEventListener("touchend", (e) => {
  const t = e.changedTouches[0];

  const dx = t.clientX - startX;
  const dy = t.clientY - startY;

  // 🔥 只在「水平明顯大於垂直」時才觸發 swipe
  if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy)) return;

  if (dx < -60) index = Math.min(2, index + 1);
  if (dx > 60) index = Math.max(0, index - 1);

  updateUI();
}, { passive: true });


document.addEventListener("touchmove", (e) => {
  if (e.touches[0].clientX < 10) {
    e.preventDefault(); // 🔥 block iOS back gesture zone
  }
}, { passive: false });
