<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest-orv.json">
<link rel="icon" type="image/png" href="icons/icon-orv-32.png">
<link rel="apple-touch-icon" href="icons/icon-orv.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>전지적 독자 시점</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  overflow: auto; /* ✅ FIX 1 */
}

/* ================= UI ================= */
.ui-bar {
  position: fixed;
  top: 10px;
  left: 10px;
  right: 10px;
  z-index: 2000;
  display: flex;
  justify-content: space-between;
}

.glass {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  border-radius: 12px;
  padding: 6px 10px;
  color: white;
}

/* ================= episode menu ================= */
#episodeMenu {
  position: fixed;
  top: 60px;
  left: 10px;
  z-index: 2001;
  width: 220px;
  max-height: 70vh;
  overflow-y: auto;
  display: none;
}

/* ================= viewer ================= */
#viewport {
  overflow-y: auto;  /* ✅ FIX 2 */
  overflow-x: hidden;
  height: 100vh;
  width: 100vw;
  touch-action: pan-y;
}

#wrapper {
  display: flex;
  width: 300vw;
  height: 100vh;
  transition: transform 0.35s ease;
}

.panel {
  width: 100vw;
  height: 100vh;
  overflow-y: auto;
}

canvas {
  width: 100%;
  display: block;
}
</style>
</head>

<body>

<div class="ui-bar">
  <div class="glass">
    Episode: <span id="epLabel">1</span>
    <button class="btn btn-sm btn-light ms-2" onclick="toggleMenu()">☰</button>
  </div>

  <div class="glass fw-bold" id="langLabel">EN</div>

  <div class="btn-group">
    <button class="btn btn-sm btn-outline-light" onclick="setLang(0)">EN</button>
    <button class="btn btn-sm btn-outline-light" onclick="setLang(1)">ZH</button>
  </div>
</div>

<div id="episodeMenu" class="glass"></div>

<div id="viewport">
  <div id="wrapper">
    <div class="panel">
      <canvas id="canvas-en"></canvas>
    </div>
    <div class="panel">
      <canvas id="canvas-zh"></canvas>
    </div>
  </div>
</div>

<script>
const preStr = 'https://newsbeiter.onrender.com/api/fetch?url=';
const TOTAL_EP = 500;

let currentEp = null;
let index = 0;

const cache = new Map();

const wrapper = document.getElementById("wrapper");
const label = document.getElementById("langLabel");
const epLabel = document.getElementById("epLabel");

/* ================= MENU ================= */

function buildEpisodeMenu() {
  const el = document.getElementById("episodeMenu");
  const step = 50;

  for (let s = 1; s <= TOTAL_EP; s += step) {
    const e = Math.min(s + step - 1, TOTAL_EP);

    const block = document.createElement("div");
    block.innerHTML = `<b>${s}-${e}</b><br/>`;

    for (let i = s; i <= e; i++) {
      const btn = document.createElement("button");
      btn.className = "btn btn-sm btn-outline-light w-100 my-1";
      btn.innerText = "EP " + i;
      btn.onclick = () => loadEpisode(i);
      block.appendChild(btn);
    }

    el.appendChild(block);
  }
}

function toggleMenu() {
  const el = document.getElementById("episodeMenu");
  el.style.display = el.style.display === "none" ? "block" : "none";
}

/* ================= LOAD ================= */

async function loadEpisode(epi) {
  currentEp = epi;
  epLabel.innerText = epi;
  localStorage.setItem("lastEp", epi);

  const imageLists = await fetchEpisode(epi);

  await Promise.all([
    stitch("canvas-en", imageLists.en),
    stitch("canvas-zh", imageLists.zh),
  ]);

  requestAnimationFrame(() => {
    requestAnimationFrame(restoreENScroll);
  });

  document.getElementById("episodeMenu").style.display = "none";
}

/* ================= SCROLL SAVE ================= */

const enPanel = document.querySelectorAll(".panel")[0];

enPanel.addEventListener("scroll", () => {
  if (!currentEp) return;
  localStorage.setItem(`scroll_en_${currentEp}`, enPanel.scrollTop);
}, { passive: true });

function restoreENScroll() {
  const enPanel = document.querySelectorAll(".panel")[0];
  const saved = localStorage.getItem(`scroll_en_${currentEp}`);
  if (saved !== null) enPanel.scrollTop = Number(saved);
}

/* ================= FETCH ================= */

async function fetchEpisode(epi) {
  const [enImages, zhImages] = await Promise.all([
    getWebtoonEpisodeImages(2154, epi),
    getWebtoonEpisodeImages(2089, epi)
  ]);

  const proxy = "https://newsbeiter.onrender.com/img?url=";

  const wrap = (arr) => arr.map(u => proxy + encodeURIComponent(u));

  return {
    en: wrap(enImages),
    zh: wrap(zhImages)
  };
}

/* ================= IMAGE ================= */

async function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

/* ================= STITCH (scroll based) ================= */

async function stitch(canvasId, urls) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext("2d");

  const imgs = (await Promise.allSettled(urls.map(loadImage)))
    .filter(r => r.status === "fulfilled")
    .map(r => r.value);

  if (!imgs.length) return;

  const width = Math.max(...imgs.map(i => i.width));

  let layout = [];
  let totalHeight = 0;

  for (const img of imgs) {
    layout.push({ img, y: totalHeight, h: img.height });
    totalHeight += img.height;
  }

  canvas.width = width;
  canvas.height = window.innerHeight;

  const viewport = document.getElementById("viewport");

  function render() {
    const scrollY = viewport.scrollTop;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const viewTop = scrollY;
    const viewBottom = scrollY + canvas.height;

    for (const item of layout) {
      if (item.y + item.h < viewTop || item.y > viewBottom) continue;
      ctx.drawImage(item.img, 0, item.y - scrollY);
    }
  }

  viewport.onscroll = render;
  render();
}

/* ================= SWIPE ================= */

function updateUI() {
  wrapper.style.transform = `translateX(-${index * 100}vw)`;
  label.innerText = ["EN","ZH"][index];
}

function setLang(i) {
  index = i;
  updateUI();
}

/* ================= INIT ================= */

buildEpisodeMenu();

const lastEp = localStorage.getItem("lastEp");
if (lastEp) loadEpisode(Number(lastEp));

</script>
</body>
</html>
