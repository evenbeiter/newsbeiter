<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Webtoon Reader Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
}

/* ================= UI ================= */
.ui-bar {
  position: fixed;
  top: 10px;
  left: 10px;
  right: 10px;
  z-index: 2000;
  display: flex;
  justify-content: space-between;
}

.glass {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  border-radius: 12px;
  padding: 6px 10px;
  color: white;
}

/* ================= episode menu ================= */
#episodeMenu {
  position: fixed;
  top: 60px;
  left: 10px;
  z-index: 2001;
  width: 220px;
  max-height: 70vh;
  overflow-y: auto;
  display: none;
}

/* ================= viewer ================= */
#viewport {
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  touch-action: pan-y; /* ✅ 只允許上下滑，禁止水平瀏覽器手勢 */

}

#wrapper {
  display: flex;
  width: 300vw;
  height: 100vh;
  transition: transform 0.35s ease;
}

.panel {
  width: 100vw;
  height: 100vh;
  overflow-y: auto;
}

canvas {
  width: 100%;
  display: block;
}
</style>
</head>

<body>

<!-- UI -->
<div class="ui-bar">
  <div class="glass">
    Episode: <span id="epLabel">1</span>
    <button class="btn btn-sm btn-light ms-2" onclick="toggleMenu()">☰</button>
  </div>

  <div class="glass fw-bold" id="langLabel">EN</div>

  <div class="btn-group">
    <button class="btn btn-sm btn-outline-light" onclick="setLang(0)">EN</button>
    <button class="btn btn-sm btn-outline-light" onclick="setLang(1)">ZH</button>
    <button class="btn btn-sm btn-outline-light" onclick="setLang(2)">KR</button>
  </div>
</div>

<!-- episode menu -->
<div id="episodeMenu" class="glass"></div>

<!-- VIEW -->
<div id="viewport">
  <div id="wrapper">
    <div class="panel"><canvas id="canvas-en"></canvas></div>
    <div class="panel"><canvas id="canvas-zh"></canvas></div>
    <div class="panel"><canvas id="canvas-kr"></canvas></div>
  </div>
</div>

<script>
/* ================= STATE ================= */

const preStr = 'https://newsbeiter.onrender.com/api/fetch?url=';
const TOTAL_EP = 500;
let currentEp = null;
let index = 0;

const cache = new Map(); // episode cache

const wrapper = document.getElementById("wrapper");
const label = document.getElementById("langLabel");
const epLabel = document.getElementById("epLabel");

/* ================= EP MENU ================= */

function buildEpisodeMenu() {
  const el = document.getElementById("episodeMenu");

  const step = 50;

  for (let s = 1; s <= TOTAL_EP; s += step) {
    const e = Math.min(s + step - 1, TOTAL_EP);

    const block = document.createElement("div");
    block.innerHTML = `<b>${s}-${e}</b><br/>`;

    for (let i = s; i <= e; i++) {
      const btn = document.createElement("button");
      btn.className = "btn btn-sm btn-outline-light w-100 my-1";
      btn.innerText = "EP " + i;

      btn.onclick = () => loadEpisode(i);

      block.appendChild(btn);
    }

    el.appendChild(block);
  }
}

function toggleMenu() {
  const el = document.getElementById("episodeMenu");
  el.style.display = el.style.display === "none" ? "block" : "none";
}

/* ================= LAZY LOAD ================= */

async function loadEpisode(epi) {
  currentEp = epi;
  epLabel.innerText = epi;

  // ✅ 記住最後 EP
  localStorage.setItem("lastEp", epi);

  if (!cache.has(epi)) {
    cache.set(epi, fetchEpisode(epi));
  }

  const imageLists = await cache.get(epi);

  await Promise.all([
    stitch("canvas-en", imageLists.en),
    stitch("canvas-zh", imageLists.zh),
    stitch("canvas-kr", imageLists.kr),
  ]);

  // ✅ restore EN scroll（延遲確保 canvas 已 render）
  requestAnimationFrame(() => {
    requestAnimationFrame(restoreENScroll);
  });

  document.getElementById("emptyState")?.style &&
  (document.getElementById("emptyState").style.display = "none");
}

/* ================= SCROLL EN ================= */

const enPanel = document.querySelectorAll(".panel")[0]; // EN

enPanel.addEventListener("scroll", () => {
  if (!currentEp) return;

  localStorage.setItem(
    `scroll_en_${currentEp}`,
    enPanel.scrollTop
  );
}, { passive: true });

function restoreENScroll() {
  const enPanel = document.querySelectorAll(".panel")[0];

  const saved = localStorage.getItem(`scroll_en_${currentEp}`);

  if (saved !== null) {
    enPanel.scrollTop = Number(saved);
  }
}

/* ================= FETCH ================= */

async function fetchEpisode(epi) {
  const [enImages, zhImages] = await Promise.all([
    getWebtoonEpisodeImages(2154, epi),
    getWebtoonEpisodeImages(2089, epi)
  ]);

  const proxy = "https://newsbeiter.onrender.com/img?url=";

  const wrap = (arr) =>
    arr.map(url => proxy + encodeURIComponent(url));

  return {
    en: wrap(enImages),
    zh: wrap(zhImages),
    kr: [] // optional
  };
}

/* ================= API ================= */

async function getWebtoonEpisodeImages(titleNo, episodeNo) {
  const viewerUrl = await getEpisodeThumbnail(titleNo, episodeNo);
  if (!viewerUrl) return [];

  const images = await fetchQ90Images(preStr+encodeURIComponent(viewerUrl));
  return images;
}

async function getEpisodeThumbnail(titleNo, episodeNo) {
  const url = preStr+"https://www.webtoons.com/api/v1/recent/episode-thumbnail";

  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      episodeIds: [{ webtoonType: "WEBTOON", titleNo, episodeNo }]
    })
  });

  const data = await res.json();
  return data?.[0]?.viewerUrl;
}

async function fetchQ90Images(viewerUrl) {
  const res = await fetch(viewerUrl);
  const html = await res.text();

  const matches = [...html.matchAll(/https?:\/\/[^"']+type=q90[^"']*/g)];
  return [...new Set(matches.map(m => m[0]))];
}

/* ================= IMAGE + CANVAS REUSE ================= */

function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

const canvasCache = new Map();

async function stitch(canvasId, urls) {
  const key = canvasId + currentEp;

  if (canvasCache.has(key)) {
    const { width, height, buffer } = canvasCache.get(key);
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext("2d");

    canvas.width = width;
    canvas.height = height;
    ctx.putImageData(buffer, 0, 0);
    return;
  }

  const imgs = await Promise.all(urls.map(loadImage));

  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext("2d");

  const width = Math.max(...imgs.map(i => i.width));
  const height = imgs.reduce((a, i) => a + i.height, 0);

  canvas.width = width;
  canvas.height = height;

  let y = 0;

  for (const img of imgs) {
    ctx.drawImage(img, 0, y);
    y += img.height - 1;
  }

  const buffer = ctx.getImageData(0, 0, width, height);
  canvasCache.set(key, { width, height, buffer });
}

/* ================= INTERSECTION OBSERVER ================= */

const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      console.log("panel visible:", e.target.id);
    }
  });
}, {
  threshold: 0.3
});

document.querySelectorAll(".panel").forEach(p => observer.observe(p));

/* ================= SWIPE ================= */

function updateUI() {
  wrapper.style.transform = `translateX(-${index * 100}vw)`;
  label.innerText = ["EN","ZH","KR"][index];
}

function setLang(i) {
  index = i;
  updateUI();
}

// let startX = 0;

// document.addEventListener("touchstart", e => {
//   startX = e.touches[0].clientX;
// });

// document.addEventListener("touchend", e => {
//   const dx = e.changedTouches[0].clientX - startX;

//   if (dx < -50) index = Math.min(2, index + 1);
//   if (dx > 50) index = Math.max(0, index - 1);

//   updateUI();
// });

const viewport = document.getElementById("viewport");

let startX = 0;
let startY = 0;

viewport.addEventListener("touchstart", (e) => {
  const t = e.touches[0];

  startX = t.clientX;
  startY = t.clientY;
}, { passive: true });

viewport.addEventListener("touchend", (e) => {
  const t = e.changedTouches[0];

  const dx = t.clientX - startX;
  const dy = t.clientY - startY;

  // 🔥 只在「水平明顯大於垂直」時才觸發 swipe
  if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy)) return;

  if (dx < -60) index = Math.min(2, index + 1);
  if (dx > 60) index = Math.max(0, index - 1);

  updateUI();
}, { passive: true });


document.addEventListener("touchmove", (e) => {
  if (e.touches[0].clientX < 10) {
    e.preventDefault(); // 🔥 block iOS back gesture zone
  }
}, { passive: false });


/* ================= INIT ================= */

buildEpisodeMenu();
// loadEpisode(1);

// ✅ 回復最後 EP
const lastEp = localStorage.getItem("lastEp");

if (lastEp) {
  loadEpisode(Number(lastEp));
}

</script>
</body>
</html>
