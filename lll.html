  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
">

    <svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" stroke="#555">

        <path d="M56 30c0-14.36-11.64-26-26-26" stroke="#555" stroke-width="6">
          <animateTransform
            attributeName="transform"
            type="rotate"
            from="0 30 30"
            to="360 30 30"
            dur="1s"

<script>
const preStr = "https://newsbeiter.onrender.com/api/fetch?url=";
const API_URL = "https://labs.google/lll/api/insights/conversation";

function showLoading() {
  document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading() {
  document.getElementById("loadingOverlay").style.display = "none";
}

async function loadNewDialogue() {
  try {
    showLoading();

    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        sourceLanguage: "English",
        targetLanguage: "American English"
      })
    });

    const data = await res.json();

    await saveDialogue(data);

    renderDialogue(data);

  } catch (e) {
    console.error(e);
    alert("Failed to load dialogue");
  } finally {
    hideLoading();
  }
}

// ===== Save to backend =====
async function saveDialogue(data) {
  await fetch("https://newsbeiter.onrender.com/language-db-save", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
}

async function loadHistory() {
  showLoading();

  try {
    const res = await fetch("https://newsbeiter.onrender.com/language-db-history");
    const list = await res.json();

    const el = document.getElementById("historyList");
    el.innerHTML = "";

    list.forEach(item => {
      const div = document.createElement("div");
      div.className = "dialogue-item";
      div.innerText = item.context.slice(0, 40) + "...";
      div.onclick = () => renderDialogue(item);
      el.appendChild(div);
    });

  } finally {
    hideLoading();
  }
}

// ===== Render dialogue =====
function renderDialogue(data) {
  document.getElementById("contextText").innerText = data.context;

  const container = document.getElementById("dialogueContainer");
  container.innerHTML = "";

  data.dialogue.forEach((d, index) => {
    const div = document.createElement("div");
    div.className = "dialogue-item";

    const processed = renderMessageWithNotes(d.message, d.notes);

    div.innerHTML = `
      <div class="speaker">${d.speaker}</div>

      <div class="message">${processed.html}</div>

      <!-- 翻譯先放 placeholder -->
      <div class="translation text-muted mt-1" id="t-${index}">
        loading translation...
      </div>

      ${processed.notesHtml}
    `;

    div.onclick = () => {
      document.querySelectorAll(".dialogue-item")
        .forEach(x => x.classList.remove("active"));
      div.classList.add("active");
      speak(d.message);
    };

    container.appendChild(div);

    // 🔥 這裡：render 時才翻譯
    translateSentence(d.message).then(tr => {
      document.getElementById(`t-${index}`).innerText = tr;
    });
  });
}

async function translateSentence(text) {
  try {
    const res = await fetch("https://newsbeiter.onrender.com/translate/sentences", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        list: [
          { sentence: text }
        ],
        source: "en",
        target: "zh-TW"
      })
    });

    const data = await res.json();

    if (!data.ok) return "";

    // API 回傳 sentence = "原文<br>翻譯"
    return data.data[0].sentence.split("<br>")[1] || "";
  } catch (e) {
    console.error(e);
    return "";
  }
}

// ===== highlight notes inside text =====
function renderMessageWithNotes(message, notes) {
  let html = message;
  let notesHtml = "";

  if (notes && Object.keys(notes).length > 0) {
    Object.entries(notes).forEach(([word, def]) => {
      const regex = new RegExp(word, "g");
      html = html.replace(
        regex,
        `<span class="note-word" title="${def}">${word}</span>`
      );

      notesHtml += `
        <div class="note-box">
          <b>${word}</b>: ${def}
        </div>
      `;
    });
  }

  return { html, notesHtml };
}

// ===== TTS =====
function speak(text) {
  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-US";

  const voices = speechSynthesis.getVoices();
  const preferred =
    voices.find(v => v.name.includes("Samantha")) || // iOS natural
    voices.find(v => v.lang === "en-US");

  if (preferred) utter.voice = preferred;

  utter.rate = 1;
  utter.pitch = 1;

  speechSynthesis.speak(utter);
}

// preload voices (important for Chrome)
speechSynthesis.onvoiceschanged = () => {
  speechSynthesis.getVoices();
};
